<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>金竹林 · 财务双面板（回溯版）</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', 'Segoe UI', Roboto, system-ui, sans-serif; }
        body {
            background: linear-gradient(145deg, #eef3f9 0%, #f9fcfd 100%);
            padding: 16px 20px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .finance-container {
            max-width: 1300px;
            width: 100%;
            background: rgba(255,255,255,0.8);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            box-shadow: 0 20px 40px -15px rgba(20,60,40,0.3);
            border: 1px solid rgba(255,255,255,0.5);
            padding: 20px 24px 25px;
        }
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 18px;
        }
        .header h1 {
            color: #1c4b2d;
            font-weight: 600;
            font-size: 1.9rem;
        }
        .header h1 small {
            font-size: 0.9rem;
            background: rgba(28,75,45,0.1);
            padding: 4px 16px;
            border-radius: 60px;
            margin-left: 12px;
            color: #1c4b2d;
            font-weight: 500;
            border: 1px solid rgba(28,75,45,0.2);
        }
        .header-actions {
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
        }
        .month-picker {
            display: flex;
            align-items: center;
            gap: 8px;
            background: white;
            padding: 5px 16px 5px 20px;
            border-radius: 60px;
            border: 1px solid #d4e2f2;
            box-shadow: 0 2px 8px -6px #809bb3;
        }
        .month-picker label {
            font-weight: 600;
            color: #1f543d;
            font-size: 0.9rem;
        }
        .month-picker input {
            border: none;
            background: #f4fafd;
            border-radius: 40px;
            padding: 6px 12px;
            font-size: 0.9rem;
            outline: none;
            border: 1px solid #d3e3f5;
        }
        .report-name {
            display: flex;
            align-items: center;
            gap: 8px;
            background: white;
            padding: 5px 14px 5px 18px;
            border-radius: 60px;
            border: 1px solid #d4e2f2;
            box-shadow: 0 2px 8px -6px #809bb3;
        }
        .report-name label {
            font-weight: 600;
            color: #1f543d;
            font-size: 0.9rem;
        }
        .report-name input {
            border: none;
            background: #f4fafd;
            border-radius: 40px;
            padding: 6px 14px;
            font-size: 0.9rem;
            width: 170px;
            outline: none;
            border: 1px solid #d3e3f5;
        }
        .export-btn {
            background: #1c4b2d;
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 60px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 6px 12px -8px #1c4b2d;
            border: 1px solid #2f6a42;
            transition: 0.1s;
        }
        .export-btn:hover { background: #256f3f; }
        .export-btn.secondary {
            background: white;
            color: #1c4b2d;
            border: 1px solid #b9d1e8;
            box-shadow: none;
        }
        .export-btn.secondary:hover { background: #f0f7fc; }
        .panels {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-top: 5px;
        }
        .panel {
            background: rgba(255,255,255,0.7);
            backdrop-filter: blur(10px);
            border-radius: 28px;
            padding: 18px 18px 22px;
            border: 1px solid rgba(255,255,255,0.9);
            box-shadow: 0 12px 24px -16px rgba(40,70,80,0.2);
        }
        .panel-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
        }
        .panel-header h2 {
            font-size: 1.7rem;
            font-weight: 600;
            color: #1f4b2e;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .panel-header h2 span {
            font-size: 0.8rem;
            background: #eef6ff;
            padding: 3px 14px;
            border-radius: 60px;
            color: #3a698b;
            border: 1px solid #cbdced;
        }
        .add-btn {
            background: white;
            border: 1px solid #b9d1e8;
            border-radius: 40px;
            padding: 8px 22px;
            font-size: 0.9rem;
            font-weight: 600;
            color: #1f4b2e;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .table-wrapper {
            max-height: 210px;
            overflow-y: auto;
            border-radius: 20px;
            background: white;
            border: 1px solid #e2eefc;
            margin-bottom: 16px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
        }
        th {
            background: #ecf5fd;
            color: #1f4a37;
            font-weight: 600;
            padding: 10px 4px;
            position: sticky;
            top: 0;
        }
        td {
            padding: 8px 4px;
            text-align: center;
            border-bottom: 1px solid #e9f0f8;
        }
        .action-btn {
            background: transparent;
            border: 1px solid #c6d9ee;
            border-radius: 30px;
            padding: 4px 12px;
            font-size: 0.75rem;
            cursor: pointer;
            margin: 0 2px;
        }
        .action-btn.edit { background: #e5f0ff; }
        .action-btn.delete { background: #ffecec; }
        .stats-mini {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }
        .stat-mini-card {
            background: white;
            border-radius: 20px;
            padding: 12px 8px 14px;
            border: 1px solid #e2edf9;
            box-shadow: 0 4px 10px -8px #7e9bb3;
        }
        .stat-mini-card .title {
            font-weight: 600;
            color: #1c4b2d;
            font-size: 0.9rem;
            margin-bottom: 6px;
            border-left: 4px solid #1c4b2d;
            padding-left: 8px;
        }
        .chart-container {
            height: 70px;
            margin: 4px 0 6px;
        }
        .total {
            font-size: 0.85rem;
            color: #3b6580;
            display: flex;
            justify-content: space-between;
            border-top: 1px dashed #c7daee;
            padding-top: 6px;
            margin-top: 4px;
        }
        .total span {
            font-weight: 700;
            color: #1c4b2d;
            font-size: 0.95rem;
        }
        .footer {
            margin-top: 20px;
            color: #5f7f9c;
            font-size: 0.85rem;
            border-top: 1px dashed #c3d6e8;
            padding-top: 14px;
            display: flex;
            justify-content: space-between;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(30,50,60,0.3);
            backdrop-filter: blur(8px);
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: rgba(255,255,255,0.95);
            border-radius: 36px;
            max-width: 400px;
            width: 90%;
            padding: 28px 24px;
            box-shadow: 0 30px 50px -20px #143b2b;
            border: 1px solid rgba(255,255,255,0.8);
        }
        .modal-content h3 {
            font-size: 1.8rem;
            font-weight: 500;
            color: #1f4b2e;
            margin-bottom: 20px;
            border-bottom: 2px solid #d6eaff;
            padding-bottom: 10px;
        }
        .form-group { margin-bottom: 18px; }
        .form-group label {
            font-weight: 600;
            color: #2f5b6e;
            display: block;
            margin-bottom: 5px;
            font-size: 0.9rem;
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 12px 18px;
            border: 1px solid #cfdbe9;
            border-radius: 60px;
            font-size: 0.95rem;
        }
        .modal-actions {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
            margin-top: 24px;
        }
        .btn-secondary {
            background: white;
            border: 1px solid #c4d2e3;
            padding: 10px 22px;
            border-radius: 60px;
            font-size: 0.95rem;
            cursor: pointer;
        }
        .btn-primary {
            background: #1c4b2d;
            color: white;
            border: none;
            padding: 10px 26px;
            border-radius: 60px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
        }
        .toast-message {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: #1c4b2d; color: white; padding: 12px 24px; border-radius: 60px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2); z-index: 9999; display: none;
        }
    </style>
</head>
<body>
<div class="finance-container">
    <div class="header">
        <h1>金竹林农家乐 <small>财务双面板·回溯版</small></h1>
        <div class="header-actions">
            <div class="month-picker">
                <label>📅 查看月份</label>
                <input type="month" id="monthSelector" value="2025-06">
            </div>
            <div class="report-name">
                <label>📋 报表名</label>
                <input type="text" id="reportNameInput" value="2025年财报" placeholder="自定义">
            </div>
            <button class="export-btn" id="exportMonthBtn">📅 导出月报</button>
            <button class="export-btn" id="exportYearBtn">📊 导出年报</button>
            <button class="export-btn secondary" id="exportAllBtn">📥 导出全部</button>
        </div>
    </div>
    <div class="panels">
        <!-- 餐饮面板 -->
        <div class="panel" id="panelCatering">
            <div class="panel-header">
                <h2>🍴 餐饮收入 <span>独立核算</span></h2>
                <button class="add-btn" id="addCateringBtn">➕ 新增记录</button>
            </div>
            <div class="table-wrapper">
                <table id="cateringTable">
                    <thead><tr><th>日期</th><th>金额(¥)</th><th>操作</th></tr></thead>
                    <tbody id="cateringTableBody"></tbody>
                </table>
            </div>
            <div class="stats-mini">
                <div class="stat-mini-card">
                    <div class="title">📆 本周</div>
                    <div class="chart-container"><canvas id="weekChartCatering"></canvas></div>
                    <div class="total">总额 <span id="weekCateringTotal">0</span></div>
                </div>
                <div class="stat-mini-card">
                    <div class="title">📅 所选月</div>
                    <div class="chart-container"><canvas id="monthChartCatering"></canvas></div>
                    <div class="total">总额 <span id="monthCateringTotal">0</span></div>
                </div>
                <div class="stat-mini-card">
                    <div class="title">📊 所选年</div>
                    <div class="chart-container"><canvas id="yearChartCatering"></canvas></div>
                    <div class="total">总额 <span id="yearCateringTotal">0</span></div>
                </div>
            </div>
        </div>
        <!-- 住宿面板 -->
        <div class="panel" id="panelLodging">
            <div class="panel-header">
                <h2>🏠 住宿收入 <span>独立核算</span></h2>
                <button class="add-btn" id="addLodgingBtn">➕ 新增记录</button>
            </div>
            <div class="table-wrapper">
                <table id="lodgingTable">
                    <thead><tr><th>日期</th><th>金额(¥)</th><th>操作</th></tr></thead>
                    <tbody id="lodgingTableBody"></tbody>
                </table>
            </div>
            <div class="stats-mini">
                <div class="stat-mini-card">
                    <div class="title">📆 本周</div>
                    <div class="chart-container"><canvas id="weekChartLodging"></canvas></div>
                    <div class="total">总额 <span id="weekLodgingTotal">0</span></div>
                </div>
                <div class="stat-mini-card">
                    <div class="title">📅 所选月</div>
                    <div class="chart-container"><canvas id="monthChartLodging"></canvas></div>
                    <div class="total">总额 <span id="monthLodgingTotal">0</span></div>
                </div>
                <div class="stat-mini-card">
                    <div class="title">📊 所选年</div>
                    <div class="chart-container"><canvas id="yearChartLodging"></canvas></div>
                    <div class="total">总额 <span id="yearLodgingTotal">0</span></div>
                </div>
            </div>
        </div>
    </div>
    <div class="footer">
        <span>🔒 数据自动保存至浏览器</span>
        <span>✨ 餐饮在上 · 住宿在下 · 可回溯任意月份</span>
    </div>
</div>

<!-- 模态框 -->
<div class="modal" id="recordModal">
    <div class="modal-content">
        <h3 id="modalTitle">新增记录</h3>
        <input type="hidden" id="recordId">
        <input type="hidden" id="modalCategory">
        <div class="form-group" id="categoryDisplayGroup" style="display:none;">
            <label>类别</label>
            <div class="readonly-category" id="categoryDisplay"></div>
        </div>
        <div class="form-group">
            <label>日期</label>
            <input type="date" id="recordDate" required>
        </div>
        <div class="form-group">
            <label>金额 (¥)</label>
            <input type="number" id="amount" min="0" step="0.01" required>
        </div>
        <div class="modal-actions">
            <button class="btn-secondary" id="cancelModalBtn">取消</button>
            <button class="btn-primary" id="saveRecordBtn">保存</button>
        </div>
    </div>
</div>
<div class="toast-message" id="toast"></div>

<script>
    (function(){
        const STORAGE_KEY = 'jzl_finance_records_v3';
        const DEFAULT_RECORDS = [
            { id: '1', date: '2025-06-01', mainCategory: '住宿', amount: 288 },
            { id: '2', date: '2025-06-01', mainCategory: '餐饮', amount: 156 },
            { id: '3', date: '2025-06-02', mainCategory: '住宿', amount: 328 },
            { id: '4', date: '2025-06-03', mainCategory: '餐饮', amount: 220 },
            { id: '5', date: '2025-06-03', mainCategory: '住宿', amount: 588 },
            { id: '6', date: '2025-06-05', mainCategory: '餐饮', amount: 98 },
            { id: '7', date: '2025-06-07', mainCategory: '住宿', amount: 120 },
            { id: '8', date: '2025-06-10', mainCategory: '餐饮', amount: 340 },
            { id: '9', date: '2025-06-15', mainCategory: '住宿', amount: 458 }
        ];

        let records = [];
        let weekChartLodging, monthChartLodging, yearChartLodging;
        let weekChartCatering, monthChartCatering, yearChartCatering;

        let selectedYear = 2025;
        let selectedMonth = 6;

        function showToast(msg, type = 'success') {
            const toast = document.getElementById('toast');
            toast.style.background = type === 'success' ? '#1c4b2d' : '#b22222';
            toast.innerText = msg;
            toast.style.display = 'block';
            setTimeout(() => { toast.style.display = 'none'; }, 2000);
        }

        function loadRecords() {
            const stored = localStorage.getItem(STORAGE_KEY);
            if (stored) {
                try { records = JSON.parse(stored); } catch { records = [...DEFAULT_RECORDS]; }
            } else {
                records = [...DEFAULT_RECORDS];
            }
            records.forEach((r, idx) => { if (!r.id) r.id = Date.now() + idx + ''; });
            renderAllTables();
            updateAllCharts();
        }

        function saveRecords() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(records));
            showToast('数据已保存');
        }

        function renderAllTables() {
            renderTable('餐饮', 'cateringTableBody');
            renderTable('住宿', 'lodgingTableBody');
        }

        function renderTable(category, tbodyId) {
            const tbody = document.getElementById(tbodyId);
            if (!tbody) return;
            tbody.innerHTML = '';
            const filtered = records.filter(r => r.mainCategory === category).sort((a,b) => a.date.localeCompare(b.date));
            filtered.forEach(record => {
                const tr = document.createElement('tr');
                tr.dataset.id = record.id;
                tr.innerHTML = `
                    <td>${record.date}</td>
                    <td>¥ ${Number(record.amount).toFixed(2)}</td>
                    <td>
                        <button class="action-btn edit" data-id="${record.id}">编辑</button>
                        <button class="action-btn delete" data-id="${record.id}">删除</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });

            tbody.querySelectorAll('.edit').forEach(btn => {
                btn.addEventListener('click', e => {
                    e.stopPropagation();
                    openEditModal(e.target.dataset.id);
                });
            });
            tbody.querySelectorAll('.delete').forEach(btn => {
                btn.addEventListener('click', e => {
                    e.stopPropagation();
                    const id = e.target.dataset.id;
                    if (confirm('删除该记录？')) {
                        records = records.filter(r => r.id !== id);
                        saveRecords();
                        renderAllTables();
                        updateAllCharts();
                    }
                });
            });
        }

        function updateAllCharts() {
            updateCategoryCharts('住宿', selectedYear, selectedMonth);
            updateCategoryCharts('餐饮', selectedYear, selectedMonth);
        }

        function updateCategoryCharts(category, targetYear, targetMonth) {
            const suffix = category === '住宿' ? 'Lodging' : 'Catering';
            const weekCanvas = document.getElementById(`weekChart${suffix}`);
            const monthCanvas = document.getElementById(`monthChart${suffix}`);
            const yearCanvas = document.getElementById(`yearChart${suffix}`);
            if (!weekCanvas || !monthCanvas || !yearCanvas) return;

            const now = new Date();

            // 本周
            const last7Days = [];
            for (let i = 6; i >= 0; i--) {
                const d = new Date(now);
                d.setDate(now.getDate() - i);
                last7Days.push(d.toISOString().slice(0,10));
            }
            const weekData = new Array(7).fill(0);
            let weekTotal = 0;
            records.filter(r => r.mainCategory === category).forEach(r => {
                const idx = last7Days.indexOf(r.date);
                if (idx !== -1) {
                    weekData[idx] += Number(r.amount);
                    weekTotal += Number(r.amount);
                }
            });
            document.getElementById(`week${suffix}Total`).innerText = '¥ ' + weekTotal.toFixed(2);

            // 所选月份
            const daysInMonth = new Date(targetYear, targetMonth, 0).getDate();
            const monthLabels = [];
            const monthData = [];
            let monthTotal = 0;
            for (let d = 1; d <= daysInMonth; d++) {
                const dateStr = `${targetYear}-${String(targetMonth).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                monthLabels.push(d);
                let sum = 0;
                records.filter(r => r.mainCategory === category).forEach(r => {
                    if (r.date === dateStr) {
                        sum += Number(r.amount);
                        monthTotal += Number(r.amount);
                    }
                });
                monthData.push(sum);
            }
            document.getElementById(`month${suffix}Total`).innerText = '¥ ' + monthTotal.toFixed(2);

            // 所选年份
            const yearData = new Array(12).fill(0);
            let yearTotal = 0;
            records.filter(r => r.mainCategory === category).forEach(r => {
                const d = new Date(r.date);
                if (d.getFullYear() === targetYear) {
                    const m = d.getMonth();
                    yearData[m] += Number(r.amount);
                    yearTotal += Number(r.amount);
                }
            });
            document.getElementById(`year${suffix}Total`).innerText = '¥ ' + yearTotal.toFixed(2);

            const weekCtx = weekCanvas.getContext('2d');
            const monthCtx = monthCanvas.getContext('2d');
            const yearCtx = yearCanvas.getContext('2d');
            const barColor = category === '住宿' ? '#4b8c7c' : '#e9b35f';

            // 基础图表配置
            const baseOptions = {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: {
                    y: { beginAtZero: true, grid: { display: false }, ticks: { display: false } },
                    x: {
                        grid: { display: false },
                        ticks: {
                            font: { size: 9 },
                            maxRotation: 45,
                            minRotation: 30,
                            autoSkip: true,
                            maxTicksLimit: 7,
                            align: 'center'
                        }
                    }
                }
            };

            // 月份图表使用更多标签
            const monthOptions = {
                ...baseOptions,
                scales: {
                    ...baseOptions.scales,
                    x: {
                        ...baseOptions.scales.x,
                        ticks: {
                            ...baseOptions.scales.x.ticks,
                            font: { size: 8 },        // 字体稍小
                            maxTicksLimit: 12,        // 最多显示12个标签，避免拥挤
                            maxRotation: 45,
                            minRotation: 30,
                            autoSkip: true,
                            align: 'center'
                        }
                    }
                }
            };

            if (category === '住宿') {
                if (weekChartLodging) weekChartLodging.destroy();
                if (monthChartLodging) monthChartLodging.destroy();
                if (yearChartLodging) yearChartLodging.destroy();
                weekChartLodging = new Chart(weekCtx, {
                    type: 'bar',
                    data: { labels: last7Days.map(d => d.slice(5)), datasets: [{ data: weekData, backgroundColor: barColor, borderRadius: 4 }] },
                    options: baseOptions
                });
                monthChartLodging = new Chart(monthCtx, {
                    type: 'bar',
                    data: { labels: monthLabels, datasets: [{ data: monthData, backgroundColor: barColor, borderRadius: 4 }] },
                    options: monthOptions
                });
                yearChartLodging = new Chart(yearCtx, {
                    type: 'bar',
                    data: { labels: ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'], datasets: [{ data: yearData, backgroundColor: barColor, borderRadius: 4 }] },
                    options: baseOptions
                });
            } else {
                if (weekChartCatering) weekChartCatering.destroy();
                if (monthChartCatering) monthChartCatering.destroy();
                if (yearChartCatering) yearChartCatering.destroy();
                weekChartCatering = new Chart(weekCtx, {
                    type: 'bar',
                    data: { labels: last7Days.map(d => d.slice(5)), datasets: [{ data: weekData, backgroundColor: barColor, borderRadius: 4 }] },
                    options: baseOptions
                });
                monthChartCatering = new Chart(monthCtx, {
                    type: 'bar',
                    data: { labels: monthLabels, datasets: [{ data: monthData, backgroundColor: barColor, borderRadius: 4 }] },
                    options: monthOptions
                });
                yearChartCatering = new Chart(yearCtx, {
                    type: 'bar',
                    data: { labels: ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'], datasets: [{ data: yearData, backgroundColor: barColor, borderRadius: 4 }] },
                    options: baseOptions
                });
            }
        }

        // 模态框逻辑
        const modal = document.getElementById('recordModal');
        const modalTitle = document.getElementById('modalTitle');
        const recordIdField = document.getElementById('recordId');
        const modalCategory = document.getElementById('modalCategory');
        const categoryDisplayGroup = document.getElementById('categoryDisplayGroup');
        const categoryDisplay = document.getElementById('categoryDisplay');
        const dateField = document.getElementById('recordDate');
        const amountField = document.getElementById('amount');

        function openAddModalFor(cat) {
            modalTitle.innerText = `新增${cat}记录`;
            recordIdField.value = '';
            modalCategory.value = cat;
            categoryDisplayGroup.style.display = 'none';
            dateField.value = new Date().toISOString().slice(0,10);
            amountField.value = '';
            modal.classList.add('active');
            setTimeout(() => amountField.focus(), 100);
        }

        function openEditModal(id) {
            const record = records.find(r => r.id === id);
            if (!record) return;
            modalTitle.innerText = '编辑记录';
            recordIdField.value = record.id;
            modalCategory.value = record.mainCategory;
            categoryDisplay.innerText = record.mainCategory;
            categoryDisplayGroup.style.display = 'block';
            dateField.value = record.date;
            amountField.value = record.amount;
            modal.classList.add('active');
            setTimeout(() => amountField.focus(), 100);
        }

        function closeModal() { modal.classList.remove('active'); }

        document.getElementById('addCateringBtn').addEventListener('click', () => openAddModalFor('餐饮'));
        document.getElementById('addLodgingBtn').addEventListener('click', () => openAddModalFor('住宿'));
        document.getElementById('cancelModalBtn').addEventListener('click', closeModal);

        amountField.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                document.getElementById('saveRecordBtn').click();
            }
        });
        dateField.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                amountField.focus();
            }
        });

        document.getElementById('saveRecordBtn').addEventListener('click', () => {
            const id = recordIdField.value;
            const cat = modalCategory.value;
            const date = dateField.value;
            const amount = parseFloat(amountField.value);

            if (!date || isNaN(amount) || amount < 0) { alert('请完整填写'); return; }

            if (id) {
                const idx = records.findIndex(r => r.id === id);
                if (idx !== -1) {
                    records[idx] = { ...records[idx], date, amount };
                }
            } else {
                records.push({ id: Date.now() + '-' + Math.random().toString(36).substr(2,6), date, mainCategory: cat, amount });
            }
            saveRecords();
            renderAllTables();
            updateAllCharts();
            closeModal();
        });

        modal.addEventListener('click', (e) => { if (e.target === modal) closeModal(); });

        const monthSelector = document.getElementById('monthSelector');
        monthSelector.addEventListener('change', (e) => {
            const [year, month] = e.target.value.split('-').map(Number);
            selectedYear = year;
            selectedMonth = month;
            updateAllCharts();
        });

        const now = new Date();
        const defaultYear = now.getFullYear();
        const defaultMonth = String(now.getMonth() + 1).padStart(2, '0');
        monthSelector.value = `${defaultYear}-${defaultMonth}`;
        selectedYear = defaultYear;
        selectedMonth = now.getMonth() + 1;

        // 导出月报
        document.getElementById('exportMonthBtn').addEventListener('click', () => {
            const name = document.getElementById('reportNameInput').value.trim() || '财务报表';
            const monthRecords = records.filter(r => {
                const d = new Date(r.date);
                return d.getFullYear() === selectedYear && (d.getMonth() + 1) === selectedMonth;
            }).sort((a,b) => a.date.localeCompare(b.date));

            if (monthRecords.length === 0) { alert('所选月份无数据'); return; }

            const csv = ['日期,类别,金额', ...monthRecords.map(r => `${r.date},${r.mainCategory},${r.amount}`)].join('\n');
            const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-12;' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `${name}_${selectedYear}-${String(selectedMonth).padStart(2,'0')}.csv`;
            link.click();
            URL.revokeObjectURL(link.href);
            showToast('月报已导出');
        });

        // 导出年报
        document.getElementById('exportYearBtn').addEventListener('click', () => {
            const name = document.getElementById('reportNameInput').value.trim() || '财务报表';
            const yearRecords = records.filter(r => {
                const d = new Date(r.date);
                return d.getFullYear() === selectedYear;
            }).sort((a,b) => a.date.localeCompare(b.date));

            if (yearRecords.length === 0) { alert('所选年份无数据'); return; }

            const csv = ['日期,类别,金额', ...yearRecords.map(r => `${r.date},${r.mainCategory},${r.amount}`)].join('\n');
            const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-12;' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `${name}_${selectedYear}年报.csv`;
            link.click();
            URL.revokeObjectURL(link.href);
            showToast('年报已导出');
        });

        // 导出全部
        document.getElementById('exportAllBtn').addEventListener('click', () => {
            const name = document.getElementById('reportNameInput').value.trim() || '财务报表';
            const csv = ['日期,类别,金额', ...records.sort((a,b)=>a.date.localeCompare(b.date)).map(r => `${r.date},${r.mainCategory},${r.amount}`)].join('\n');
            const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-12;' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `${name}_全部_${new Date().toISOString().slice(0,10)}.csv`;
            link.click();
            URL.revokeObjectURL(link.href);
            showToast('全部数据已导出');
        });

        loadRecords();
    })();
</script>
</body>
</html>
