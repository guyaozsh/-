            <p>布草间二楼，规格1.5m/1.2m</p>

        // ---------- DOM 元素 ----------
        const mainContent = document.getElementById('mainContent');
        const editRequestBtn = document.getElementById('editRequestBtn');
        const saveExitBtn = document.getElementById('saveExitBtn');
        const resetDefaultBtn = document.getElementById('resetDefaultBtn');
        const editModeIndicator = document.getElementById('editModeIndicator');
        const securityQuickPanel = document.getElementById('securityQuickPanel');
        const securitySettingsBtn = document.getElementById('securitySettingsBtn');
        const changePwdBtn = document.getElementById('changePwdBtn');
        const forgotPwdBtn = document.getElementById('forgotPwdBtn');
        const closeSecurityPanel = document.getElementById('closeSecurityPanel');
        const modalOverlay = document.getElementById('modalOverlay');
        const modalContent = document.getElementById('modalContent');

        let isEditMode = false;

        function loadContent() {
            const saved = localStorage.getItem(STORAGE_CONTENT);
            mainContent.innerHTML = saved || DEFAULT_CONTENT_HTML;
        }
        loadContent();

        function setEditMode(mode) {
            isEditMode = mode;
            if (mode) {
                mainContent.setAttribute('contenteditable', 'true');
                editModeIndicator.textContent = '✏️ 编辑模式(直接修改)';
                editModeIndicator.style.display = 'inline-block';
                editRequestBtn.style.display = 'none';
                saveExitBtn.style.display = 'inline-block';
                resetDefaultBtn.style.display = 'inline-block';
            } else {
                mainContent.removeAttribute('contenteditable');
                editModeIndicator.textContent = '🔒 浏览模式';
                editModeIndicator.style.display = 'inline-block';
                editRequestBtn.style.display = 'inline-block';
                saveExitBtn.style.display = 'none';
                resetDefaultBtn.style.display = 'none';
                localStorage.setItem(STORAGE_CONTENT, mainContent.innerHTML);
            }
        }

        function checkPassword(inputPwd) {
            const storedPwd = localStorage.getItem(STORAGE_PASSWORD) || DEFAULT_PASSWORD;
            return inputPwd === storedPwd;
        }

        function showModal(html) {
            modalContent.innerHTML = html;
            modalOverlay.classList.remove('hidden');
        }
        function hideModal() { modalOverlay.classList.add('hidden'); }

        editRequestBtn.addEventListener('click', () => {
            securityQuickPanel.classList.remove('hidden');
        });

        closeSecurityPanel.addEventListener('click', () => {
            securityQuickPanel.classList.add('hidden');
        });

        changePwdBtn.addEventListener('click', () => {
            showModal(`
                <h3>🔑 修改密码</h3>
                <div class="input-group"><label>当前密码</label><input type="password" id="oldPwd" placeholder="输入当前密码"></div>
                <div class="input-group"><label>新密码</label><input type="password" id="newPwd" placeholder="新密码"></div>
                <div class="input-group"><label>确认新密码</label><input type="password" id="confirmPwd" placeholder="再次输入"></div>
                <div class="modal-actions">
                    <button class="btn btn-outline" id="cancelModal">取消</button>
                    <button class="btn btn-primary" id="submitChangePwd">确认修改</button>
                </div>
            `);
            document.getElementById('cancelModal').addEventListener('click', hideModal);
            document.getElementById('submitChangePwd').addEventListener('click', () => {
                const old = document.getElementById('oldPwd').value;
                const newP = document.getElementById('newPwd').value;
                const confirm = document.getElementById('confirmPwd').value;
                if (!checkPassword(old)) { alert('当前密码错误'); return; }
                if (newP !== confirm) { alert('两次新密码不一致'); return; }
                localStorage.setItem(STORAGE_PASSWORD, newP);
                alert('密码修改成功');
                hideModal();
            });
        });

        forgotPwdBtn.addEventListener('click', () => {
            const question = localStorage.getItem(STORAGE_QUESTION);
            if (!question) {
                if (confirm('未设置密保问题，是否重置为默认密码？')) {
                    localStorage.setItem(STORAGE_PASSWORD, DEFAULT_PASSWORD);
                    alert('密码已重置为默认: ' + DEFAULT_PASSWORD);
                }
                return;
            }
            showModal(`
                <h3>❓ 密保验证</h3>
                <div class="input-group"><label>${question}</label><input type="text" id="securityAnswer" placeholder="输入答案"></div>
                <div class="modal-actions">
                    <button class="btn btn-outline" id="cancelModal">取消</button>
                    <button class="btn btn-primary" id="submitAnswer">验证</button>
                </div>
            `);
            document.getElementById('cancelModal').addEventListener('click', hideModal);
            document.getElementById('submitAnswer').addEventListener('click', () => {
                const ans = document.getElementById('securityAnswer').value.trim();
                const storedAns = localStorage.getItem(STORAGE_ANSWER) || '';
                if (ans.toLowerCase() === storedAns.toLowerCase()) {
                    showModal(`
                        <h3>🔐 重置密码</h3>
                        <div class="input-group"><label>新密码</label><input type="password" id="newPwdReset" placeholder="输入新密码"></div>
                        <div class="input-group"><label>确认新密码</label><input type="password" id="confirmPwdReset" placeholder="再次输入"></div>
                        <div class="modal-actions">
                            <button class="btn btn-outline" id="cancelModal">取消</button>
                            <button class="btn btn-primary" id="submitReset">确认重置</button>
                        </div>
                    `);
                    document.getElementById('cancelModal').addEventListener('click', hideModal);
                    document.getElementById('submitReset').addEventListener('click', () => {
                        const np = document.getElementById('newPwdReset').value;
                        const cp = document.getElementById('confirmPwdReset').value;
                        if (np !== cp) { alert('两次密码不一致'); return; }
                        localStorage.setItem(STORAGE_PASSWORD, np);
                        alert('密码已重置');
                        hideModal();
                    });
                } else {
                    alert('答案错误');
                }
            });
        });

        securitySettingsBtn.addEventListener('click', () => {
            const currentQ = localStorage.getItem(STORAGE_QUESTION) || '';
            showModal(`
                <h3>⚙️ 密保设置</h3>
                <div class="input-group"><label>密保问题</label><input type="text" id="secQuestion" value="${currentQ.replace(/"/g, '&quot;')}" placeholder="例如：我的宠物名字"></div>
                <div class="input-group"><label>密保答案</label><input type="text" id="secAnswer" placeholder="输入答案（不区分大小写）"></div>
                <p style="color:#a67b3c;">留空则清除密保</p>
                <div class="modal-actions">
                    <button class="btn btn-outline" id="cancelModal">取消</button>
                    <button class="btn btn-primary" id="saveSec">保存密保</button>
                </div>
            `);
            document.getElementById('cancelModal').addEventListener('click', hideModal);
            document.getElementById('saveSec').addEventListener('click', () => {
                const q = document.getElementById('secQuestion').value.trim();
                const a = document.getElementById('secAnswer').value.trim();
                if (q === '' || a === '') {
                    localStorage.removeItem(STORAGE_QUESTION);
                    localStorage.removeItem(STORAGE_ANSWER);
                    alert('密保已清除');
                } else {
                    localStorage.setItem(STORAGE_QUESTION, q);
                    localStorage.setItem(STORAGE_ANSWER, a);
                    alert('密保设置成功');
                }
                hideModal();
            });
        });

        window.submitPasswordAttempt = () => {
            const pwd = prompt('请输入编辑密码');
            if (pwd && checkPassword(pwd)) {
                setEditMode(true);
                securityQuickPanel.classList.add('hidden');
            } else {
                alert('密码错误');
            }
        };
        editRequestBtn.addEventListener('click', () => {
            window.submitPasswordAttempt();
        });

        saveExitBtn.addEventListener('click', () => setEditMode(false));

        resetDefaultBtn.addEventListener('click', () => {
            if (confirm('恢复默认会丢失所有编辑内容，确定？')) {
                mainContent.innerHTML = DEFAULT_CONTENT_HTML;
                if (!isEditMode) localStorage.setItem(STORAGE_CONTENT, DEFAULT_CONTENT_HTML);
            }
        });

        modalOverlay.addEventListener('click', (e) => {
            if (e.target === modalOverlay) hideModal();
        });

        window.addEventListener('beforeunload', (e) => {
            if (isEditMode) {
                e.preventDefault();
                e.returnValue = '编辑尚未保存';
            }
        });

        document.addEventListener('keydown', (e) => {
            if (e.ctrlKey && e.key === 's' && isEditMode) {
                e.preventDefault();
                setEditMode(false);
                alert('已保存并退出');
            }
        });
    })();
</script>

</html>
